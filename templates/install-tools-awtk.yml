# ============================================================
# Template: install-tools.yml
#
# Este template instala herramientas necesarias para build.bat del SDK:
#  - Node.js (para npm / TypeScript build)
#  - npm install (dependencias)
#  - Python (para scripts .py: update_res.py es para , pack_res.py, etc.)
#  - SCons (para build de librerías nativas / AWTK )
#
# Nota: La documentación pide Node >= 16.x.
# La propuesta es usar 18.x por estabilidad. Si hay incompatibilidad, se cambia a 16.x.
# ============================================================

steps:
  # ------------------------------
  # Node.js (18.x por estabilidad)
  # ------------------------------
  - task: NodeTool@0
    displayName: "Install Node.js (18.x recommended; switch to 16.x if build.bat has issues)"
    inputs:
      versionSpec: "18.x"

  # ------------------------------
  # npm install (dependencias)
  # ------------------------------
  - script: npm install
    displayName: "npm install (project dependencies)"

  # ------------------------------
  # Python (>=3.5 mínimo, 3.11 recomendado)
  # ------------------------------
  - task: UsePythonVersion@0
    displayName: "Install Python (3.11)"
    inputs:
      versionSpec: "3.11"
      addToPath: true

  # ------------------------------
  # SCons (instalación por pip)
  # ------------------------------
  - pwsh: |
      $ErrorActionPreference = "Stop"
      python -m pip install --upgrade pip
      python -m pip install scons
    displayName: "Install SCons (pip)"

  # ------------------------------
  # AWTK (DEPENDENCIA DE BUILD DEL SDK)
  # ------------------------------
  - pwsh: |
      $ErrorActionPreference = "Stop"

      # Clonamos el repositorio oficial de AWTK
      # Este es el mismo framework que se instala cuando se usa AWStudio,
      # pero aquí lo usamos de forma explícita para evitar dependencias locales.
      git clone https://github.com/zlgopen/awtk.git awtk

      # IMPORTANTE: Fijamos una versión específica para asegurar builds reproducibles.
      # (este tag debe validarse con el equipo; se usa como workaround)
      cd awtk
      git checkout v1.2.2 # Version requerida por el SDK 

      # Compilamos AWTK usando SCons.
      # Esto genera los binarios requeridos por update_res.py (imagegen, fontgen, resgen, etc.)
      scons -c
      scons
    displayName: "Clone and build AWTK (official repo, fixed version)"

  # ------------------------------
  # Exportar AWTK_SDK_PATH para el SDK
  # ------------------------------
  - pwsh: |
      # Esta variable es usada por awtk_locator.py para localizar AWTK.
      # la definimos explícitamente evitamos dependencias locales
      echo "##vso[task.setvariable variable=AWTK_SDK_PATH]$(Build.SourcesDirectory)\awtk"
    displayName: "Set AWTK_SDK_PATH" # Esta ruta es usada por el SDK para localizar AWTK, lo que es crucial para que build.bat funcione correctamente. Al establecer esta variable de entorno, aseguramos que el proceso de build pueda encontrar las herramientas y librerías de AWTK necesarias para compilar el proyecto.

  # ------------------------------
  # Verificación de versiones (log)
  # ------------------------------
  - pwsh: |
      Write-Host "========================================"
      Write-Host " Build environment versions"
      Write-Host "========================================"
      node --version
      npm --version
      python --version
      scons --version
      Write-Host "AWTK path: $env:AWTK_SDK_PATH"
      Write-Host "========================================"
    displayName: "Verify tool versions"